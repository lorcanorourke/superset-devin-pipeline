name: Devin Issue Remediation

on:
  issues:
    types: [labeled]
  workflow_dispatch:

jobs:
  remediate:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'devin-task'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyGithub python-dotenv

      - name: Run Devin automation
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python orchestrator.py